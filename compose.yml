services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vdv}:${POSTGRES_PASSWORD:-vdv}@db:5432/${POSTGRES_DB:-vdv}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vdv}
      POSTGRES_DB: ${POSTGRES_DB:-vdv}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vdv} -d ${POSTGRES_DB:-vdv}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
